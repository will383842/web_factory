# gitleaks config for WebFactory
# extends the default ruleset, adds project-specific allowlists.

[extend]
useDefault = true

[allowlist]
description = "WebFactory allowlist for known-safe placeholders and example fixtures"

paths = [
    '''(?i)\.env\.example$''',
    '''(?i)\.env\.testing$''',
    '''(?i)docs/.*''',
    '''(?i)tests/.*\.fixture\..*''',
    '''(?i)CHANGELOG\.md''',
]

regexes = [
    # APP_KEY placeholders generated by Laravel
    '''APP_KEY=base64:[A-Za-z0-9+/=]{20,}''',
    # Local-only Reverb dev keys
    '''REVERB_APP_(KEY|SECRET)=local''',
    # MinIO documented dev creds
    '''secret_change_me_local_only''',
    # Local Meilisearch dev master key
    '''local_dev_master_key_change_me''',
]

# Project-specific rules (in addition to defaults)
[[rules]]
id = "stripe-secret"
description = "Stripe Secret API Key"
regex = '''sk_(test|live)_[0-9a-zA-Z]{24,}'''
tags = ["api", "stripe", "secret"]

[[rules]]
id = "sentry-dsn-personal"
description = "Sentry DSN with org/key (allow placeholder)"
regex = '''https://[0-9a-f]{32}@(?!example|placeholder|0\.).*\.ingest\.sentry\.io/[0-9]+'''
tags = ["sentry", "url"]

[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''(?i)bot[0-9]{8,12}:[A-Za-z0-9_-]{30,}'''
tags = ["telegram", "secret"]
