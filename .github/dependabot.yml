version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies, php]
    groups:
      laravel-ecosystem:
        patterns:
          - 'laravel/*'
          - 'illuminate/*'
      filament-ecosystem:
        patterns:
          - 'filament/*'
      dev-tools:
        dependency-type: development

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies, javascript]
    groups:
      vue-ecosystem:
        patterns:
          - 'vue'
          - '@vitejs/*'
          - '@vue/*'
          - '@inertiajs/*'
          - 'pinia'
      tailwind-ecosystem:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      lint-tooling:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'prettier*'
          - '@commitlint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
    labels: [ci, github-actions]

  - package-ecosystem: docker
    directory: /docker/php
    schedule:
      interval: monthly
    commit-message:
      prefix: build
    labels: [docker, dependencies]
