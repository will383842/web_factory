; WebFactory custom PHP overrides — loaded as conf.d/zz-webfactory.ini

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 60
date.timezone = UTC
expose_php = Off

; Realpath cache (improves perfs significantly with many composer files)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Error handling
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL
error_log = /proc/self/fd/2

; OPcache (high-perf in dev, validate_timestamps=1 keeps DX hot reload)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1
opcache.jit = off
opcache.jit_buffer_size = 0

; Xdebug placeholder (enable via XDEBUG_MODE=develop,debug env at runtime)
; pecl install xdebug-3.x is left out of base image to keep it slim.
